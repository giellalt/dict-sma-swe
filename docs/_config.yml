remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for South Saami ⇒ Swedish
description: An electronic dictionary from South Saami to Swedish
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: minimal
